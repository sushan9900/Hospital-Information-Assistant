server {
    listen 80;
    server_name localhost;

    # Serve static files from the build output directory
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # Single Page Application (SPA) Routing Guard:
        # If a file ($uri) or directory ($uri/) is not found,
        # fallback and serve index.html. This allows React Router
        # to handle the requested URL paths client-side.
        try_files $uri $uri/ /index.html;
    }

    # Redirect server errors to static 50x page
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
